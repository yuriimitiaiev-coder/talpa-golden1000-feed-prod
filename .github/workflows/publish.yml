name: Build and publish Golden 1000 XML

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: talpa-golden1000-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Build filtered XML
        env:
          SOURCE_FEED_URL: ${{ secrets.SOURCE_FEED_URL }}
          EXPECTED_COUNT: "1000"
          DOWNLOAD_TIMEOUT_SECONDS: "120"
        run: python scripts/filter_feed.py

      - name: Validate generated output
        run: |
          test -s docs/golden1000.xml
          test -s docs/status.json
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path("docs/status.json").read_text(encoding="utf-8"))
          assert status["offers"] == 1000, status
          assert status["categories"] > 0, status
          assert len(status["sha256"]) == 64, status
          print(json.dumps(status, ensure_ascii=False, indent=2))
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
